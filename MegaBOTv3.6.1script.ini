n110=    .timerRNVFNIVM 1 $calc(%NSKCBNS + 1) unset %STRVM | .timerRNVFM 1 $calc(%NSKCBNS + 1) .msg $1 10 $+ $nick $+ 2, Comando !RVM Finalizado. | unset %UXSRFN %NSKCBNS %rvndflt
