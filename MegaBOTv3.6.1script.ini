n53=    inc %qhtml
n54=    if ($mid($1-,%qhtml,1) == $chr(32)) { set %qhtml.d %qhtml.d $chr(32) | goto 1 }
n55=    if ($mid($1-,%qhtml,1) == >) { unset %qhtml.tr | goto 1 }
n56=    if ($mid($1-,%qhtml,1) == <) { set %qhtml.tr on | goto 1 }
n57=    if (%qhtml.tr == on) { goto 1 }
n58=    set %qhtml.d %qhtml.d $+ $mid($1-,%qhtml,1)
n59=    goto 1
n60=} }
n61=Alias hf {
